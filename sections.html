<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لفظي - الأقسام</title><style>body{font-family:Arial,Tahoma,sans-serif;background:#f5f5f5;padding:14px;line-height:1.7}.box{background:white;border:1px solid #ddd;border-radius:14px;padding:16px;margin:10px auto;max-width:850px}button,select,input{font:inherit;padding:10px;margin:4px;border:1px solid #bbb;border-radius:8px}.primary{background:#111;color:white}.choice{display:block;width:100%;text-align:right;margin:8px 0}.sel{outline:3px solid #777}.good{background:#e9f8ee}.bad{background:#fff0f0}.hide{display:none}.passage{background:#fafafa;border-right:4px solid #bbb;padding:10px;margin:10px 0}</style></head><body><div class="box" id="home"><h1>لفظي - اختبار حسب القسم</h1><p>اختر قسمًا من توزيع الملفات الأصلية.</p><select id="sec"><option value="">كل الأقسام</option></select><input id="n" type="number" value="5" min="1" max="10"><button class="primary" onclick="start()">ابدأ</button><p id="info"></p></div><div class="box hide" id="test"><div id="qbox"></div><button onclick="prev()">السابق</button><button class="primary" onclick="next()">التالي</button><button onclick="finish()">النتيجة</button></div><div class="box hide" id="res"><h2>النتيجة</h2><p id="score"></p><button onclick="copyResult()">نسخ النتيجة</button><button onclick="location.reload()">اختبار جديد</button><textarea id="txt" style="width:100%;height:100px"></textarea><div id="rev"></div></div><script>var DATA=[{s:172,q:10,t:'تناظر',qt:'..... نافذة : منزل',p:'',c:{'أ':'سكن : مستأجر','ب':'رف : خزانة','ج':'البحر : الشاطئ','د':'كتاب : صفحة'},a:'ب'},{s:172,q:9,t:'استيعاب',qt:'الاعتذار يدل على:',p:'يعد الاعتذار سلوكا راقيا يدل على شجاعة الإنسان ووعيه بخطئه.',c:{'أ':'الضعف','ب':'الشجاعة والوعي بالخطأ','ج':'الكبر','د':'الإصرار على الخطأ'},a:'ب'},{s:176,q:1,t:'استيعاب',qt:'تدور الفقرة حول:',p:'أجرت شركة تقنية تجربة خفضت فيها أسبوع العمل إلى أربعة أيام.',c:{'أ':'زيادة الرواتب','ب':'تقليل أيام العمل','ج':'خفض عدد الموظفين','د':'زيادة ساعات العمل'},a:'ب'},{s:176,q:7,t:'تناظر',qt:'دواء : شفاء',p:'',c:{'أ':'طعام: شبع','ب':'نوم: تعب','ج':'علم: جهل','د':'مال: فقر'},a:'أ'},{s:70,q:2,t:'تناظر',qt:'قلم : كتابة',p:'',c:{'أ':'مفتاح: قفل','ب':'فرشاة: رسم','ج':'عين: نظر','د':'سيف: قطع'},a:'ب'},{s:99,q:6,t:'استيعاب',qt:'من حلول ندرة المياه المذكورة:',p:'الماء أساس الحياة، وندرة المياه من أكبر التحديات.',c:{'أ':'الإسراف في الماء','ب':'قطع الأشجار','ج':'تحلية مياه البحر','د':'زيادة التلوث'},a:'ج'}];var quiz=[],ans={},i=0,last='';function esc(x){return String(x||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function sh(a){a=a.slice();for(var j=a.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1)),t=a[j];a[j]=a[k];a[k]=t}return a}function pool(){var s=document.getElementById('sec').value;return DATA.filter(function(r){return !s||String(r.s)==s})}function init(){var m={};DATA.forEach(function(r){m[r.s]=(m[r.s]||0)+1});Object.keys(m).sort().forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent='القسم '+s+' - '+m[s]+' سؤال';sec.appendChild(o)});sec.onchange=function(){info.innerHTML='المتاح: '+pool().length};info.innerHTML='المتاح: '+pool().length}function start(){var p=pool(),n=Math.min(parseInt(document.getElementById('n').value||5),p.length);quiz=sh(p).slice(0,n);ans={};i=0;home.className='box hide';test.className='box';draw()}function draw(){var r=quiz[i],h='<p>القسم '+r.s+' - سؤال '+r.q+' - '+r.t+'</p>'+(r.p?'<div class=passage>'+esc(r.p)+'</div>':'')+'<h2>'+esc(r.qt)+'</h2>';['أ','ب','ج','د'].forEach(function(k){h+='<button class="choice '+(ans[i]==k?'sel':'')+'" onclick="pick(\''+k+'\')">'+k+') '+esc(r.c[k])+'</button>'});qbox.innerHTML=h}function pick(k){ans[i]=k;draw()}function next(){if(i<quiz.length-1){i++;draw()}else finish()}function prev(){if(i>0){i--;draw()}}function finish(){var ok=0,wrong=[];quiz.forEach(function(r,idx){if(ans[idx]==r.a)ok++;else wrong.push('ق'+r.s+'/'+r.q+' اختيار '+(ans[idx]||'لم يجب')+' الصحيح '+r.a)});test.className='box hide';res.className='box';score.innerHTML='الصحيح: '+ok+' من '+quiz.length+' - النسبة: '+Math.round(ok/quiz.length*100)+'%';last='نتيجة لفظي حسب الأقسام\n'+score.innerText+'\nالأخطاء:\n'+(wrong.join('\n')||'لا توجد');txt.value=last;rev.innerHTML=wrong.join('<br>')}function copyResult(){txt.select();document.execCommand('copy');alert('تم نسخ النتيجة')}init();</script></body></html>
